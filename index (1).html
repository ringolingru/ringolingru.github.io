<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ringo Li</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--ink:#1a1a18;--muted:#888880;--line:#e8e8e2;--accent:#2a5c8a;--serif:"EB Garamond",Georgia,serif;--mono:"DM Mono",monospace}
html,body{background:var(--bg);color:var(--ink);font-family:var(--serif);font-size:18px;line-height:1.75;min-height:100vh}
.page{max-width:580px;margin:0 auto;padding:5rem 2rem 7rem}
.header{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:2.6rem}
.avatar{width:130px;height:130px;border-radius:50%;overflow:hidden;margin-bottom:1.1rem;border:1.5px solid var(--line)}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center top}
h1{font-family:var(--serif);font-size:1.9rem;font-weight:400;letter-spacing:-0.01em;color:var(--ink);margin-bottom:.25rem}
.tagline{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;line-height:1.5}
nav{display:flex;flex-wrap:nowrap;justify-content:center;gap:.1rem;margin-bottom:2.8rem;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:.6rem 0;overflow-x:auto}
.nav-btn{background:none;border:none;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;padding:3px 7px;border-radius:3px;letter-spacing:.03em;transition:color .15s,background .15s}
.nav-btn:hover,.nav-btn.active{color:var(--accent);background:#eaf0f6}
.nav-link{font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;padding:3px 7px;border-radius:3px;letter-spacing:.03em;transition:color .15s}
.nav-link::after{content:"↗";font-size:9px;margin-left:2px;opacity:.5}
.nav-link:hover{color:var(--ink)}
.terminal{display:none;border-radius:4px;overflow:hidden;background:#111}
.terminal.visible{display:block}
.term-body{padding:1.4rem 1.6rem 1.8rem;min-height:120px;max-height:65vh;overflow-y:auto}
.prompt{display:flex;gap:6px;margin-bottom:.9rem;font-family:var(--mono);font-size:12px;color:#555}
.prompt-sym{color:#4ade80}
.output{font-family:var(--serif);font-size:17px;line-height:1.85;color:#e8e8e0;white-space:pre-wrap;word-break:break-word}
.hl{color:#e8e8e0;font-weight:400}
.hl-dim{color:#86efac}
.hl-num{color:#fcd34d;font-weight:400}
.cursor{display:inline-block;width:7px;height:15px;background:#4ade80;vertical-align:text-bottom;margin-left:1px;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.hint{margin-top:.6rem;font-family:var(--mono);font-size:11px;color:#aaa;letter-spacing:.04em;text-align:center}
footer{margin-top:4rem;padding-top:1.2rem;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;color:#ccc;letter-spacing:.04em;text-align:center}
@media(max-width:500px){.page{padding:2.5rem 1.2rem 5rem}h1{font-size:1.5rem}.avatar{width:100px;height:100px}}
</style>
</head>

<script>
var TABS={
  about:{cmd:"ringo --about",raw:"Hi, I\u2019m <hl>Ringo Li</hl> \u2014 an <hl>ACCA-qualified</hl> Finance Business Partner with <hl-num>9+</hl-num> years of FP&A experience across complex, multi-market environments."},
  email:{cmd:"ringo --email",raw:"<hl>ringo.lingru@gmail.com</hl>"},
  bio:{cmd:"ringo --skills",raw:"<hl>Strategic FP&A & Commercial Finance</hl>\n<hl>Executive Business Partnering</hl>\n<hl>Advanced Financial Modelling</hl>\n<hl>Data Analytics & Automation</hl>\n<hl>Leadership & Process Transformation</hl>"},
  base:{cmd:"ringo --base",raw:"<hl>London / Surrey, UK</hl>"},
  qualification:{cmd:"ringo --qualification",raw:"<hl>ACCA Qualified</hl>\n<hl>MSc Accounting, Finance and Management</hl>\n<hl>BSc Accounting</hl>"},
  interests:{cmd:"ringo --interests",raw:"🎾  Tennis\n🏃  Jogging\n📚  Reading\n🥾  Hiking"}
};

function parseSegments(raw){
  var parts=[];
  var re=/<(hl(?:-dim|-num)?)>([\s\S]*?)<\/\1>/g;
  var last=0,m;
  while((m=re.exec(raw))!==null){
    if(m.index>last)parts.push({type:"plain",text:raw.slice(last,m.index)});
    parts.push({type:m[1],text:m[2]});
    last=re.lastIndex;
  }
  if(last<raw.length)parts.push({type:"plain",text:raw.slice(last)});
  return parts;
}

function segmentsToHtml(segs){
  return segs.map(function(s){
    function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
    if(s.type==="hl")return "<span class=\"hl\">"+esc(s.text)+"</span>";
    if(s.type==="hl-dim")return "<span class=\"hl-dim\">"+esc(s.text)+"</span>";
    if(s.type==="hl-num")return "<span class=\"hl-num\">"+esc(s.text)+"</span>";
    return esc(s.text);
  }).join("");
}

function flattenChars(segs){
  var chars=[];
  for(var i=0;i<segs.length;i++){
    var seg=segs[i];
    for(var j=0;j<seg.text.length;j++){chars.push({ch:seg.text[j],type:seg.type});}
  }
  return chars;
}

var typeTimer=null;

function openTab(name){
  if(typeTimer){clearTimeout(typeTimer);typeTimer=null;}
  var data=TABS[name];
  var terminal=document.getElementById("terminal");
  var promptLine=document.getElementById("prompt-line");
  var promptCmd=document.getElementById("prompt-cmd");
  var output=document.getElementById("output");
  var cursor=document.getElementById("cursor");
  var hint=document.getElementById("hint");
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.toggle("active",b.dataset.tab===name);});
  terminal.classList.add("visible");
  hint.style.display="none";
  promptCmd.textContent=data.cmd;
  promptLine.style.display="flex";
  output.innerHTML="";
  cursor.style.display="inline-block";
  var segs=parseSegments(data.raw);
  var chars=flattenChars(segs);
  var i=0;
  function tick(){
    if(i>=chars.length){cursor.style.display="none";return;}
    var step=Math.random()<.12?3:Math.random()<.28?2:1;
    i=Math.min(i+step,chars.length);
    var typed=chars.slice(0,i);
    var built=[];var cur=null;
    for(var k=0;k<typed.length;k++){
      var c=typed[k];
      if(!cur||cur.type!==c.type){cur={type:c.type,text:""};built.push(cur);}
      cur.text+=c.ch;
    }
    output.innerHTML=segmentsToHtml(built);
    document.getElementById("term-body").scrollTop=99999;
    typeTimer=setTimeout(tick,6+Math.random()*12);
  }
  tick();
}

document.querySelectorAll(".nav-btn").forEach(function(btn){
  btn.addEventListener("click",function(){openTab(btn.dataset.tab);});
});
setTimeout(function(){openTab("about");},500);
</script>
